<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <style>
        body { font-family: Arial; margin: 50px; background: #f5f5f5; }
        form { background: white; padding: 20px; border-radius: 8px; width: 300px; margin: auto; }
        h2 { text-align: center; }
        input, select, button { width: 100%; margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>
    <form action="/predict" method="post">
        <h2>Student Performance Predictor</h2>
        <input type="number" name="hours" placeholder="Study Hours per Day" step="0.1" required>
        <input type="number" name="age" placeholder="Age" required>
        <select name="internet">
            <option value="yes">Has Internet</option>
            <option value="no">No Internet</option>
        </select>
        <button type="submit">Predict</button>
        {% if result %}
            <p style="margin-top: 20px;"><strong>{{ result }}</strong></p>
        {% endif %}
    </form>
</body>
</html>
